# Module 8: Services containerized + PostgreSQL
# This is where services move from local SQLite to Docker + PostgreSQL.
# notification-service stays local (Node.js + SQLite) — never containerized.
version: "3.9"

services:
  user-service:
    build: { context: ../../services/user-service, target: runtime }
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gamehub}:${POSTGRES_PASSWORD:-gamehub_pass}@postgres:5432/user_db
      OTEL_SERVICE_NAME: user-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports: ["8001:8001"]
    networks: [gamehub]
    depends_on: { postgres: { condition: service_healthy } }
    labels:
      prometheus.scrape: "true"
      prometheus.port: "8001"
      prometheus.path: "/metrics"

  game-service:
    build: { context: ../../services/game-service, target: runtime }
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gamehub}:${POSTGRES_PASSWORD:-gamehub_pass}@postgres:5432/game_db
      REDIS_URL: redis://redis:6379
      OTEL_SERVICE_NAME: game-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports: ["8002:8002"]
    networks: [gamehub]
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
    labels:
      prometheus.scrape: "true"
      prometheus.port: "8002"
      prometheus.path: "/metrics"

  activity-service:
    build: { context: ../../services/activity-service, target: runtime }
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gamehub}:${POSTGRES_PASSWORD:-gamehub_pass}@postgres:5432/activity_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      USER_SERVICE_URL: http://user-service:8001
      GAME_SERVICE_URL: http://game-service:8002
      OTEL_SERVICE_NAME: activity-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports: ["8003:8003"]
    networks: [gamehub]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
      rabbitmq: { condition: service_healthy }
    labels:
      prometheus.scrape: "true"
      prometheus.port: "8003"
      prometheus.path: "/metrics"

  logging-service:
    build: { context: ../../services/logging-service, target: runtime }
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-gamehub}:${POSTGRES_PASSWORD:-gamehub_pass}@postgres:5432/logging_db
      KAFKA_BOOTSTRAP_SERVERS: kafka:9092
      OTEL_SERVICE_NAME: logging-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
    ports: ["8005:8005"]
    networks: [gamehub]
    depends_on:
      postgres: { condition: service_healthy }
      kafka: { condition: service_healthy }
    labels:
      prometheus.scrape: "true"
      prometheus.port: "8005"
      prometheus.path: "/metrics"
