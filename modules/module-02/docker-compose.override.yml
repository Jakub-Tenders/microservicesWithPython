# Module 2: user-service + product-service
# Usage: docker compose -f docker-compose.infra.yml -f modules/module-02/docker-compose.override.yml up
version: "3.9"

services:
  user-service:
    build:
      context: ../../services/user-service
      target: runtime
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-shopmicro}:${POSTGRES_PASSWORD:-shopmicro_pass}@postgres:5432/user_db
      OTEL_SERVICE_NAME: user-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      DEBUG: "false"
    ports:
      - "8001:8001"
    networks:
      - shopmicro
    depends_on:
      postgres:
        condition: service_healthy
    labels:
      traefik.enable: "true"
      traefik.http.routers.user-service.rule: "PathPrefix(`/api/users`)"
      traefik.http.routers.user-service.entrypoints: web
      traefik.http.middlewares.user-strip.stripprefix.prefixes: "/api"
      traefik.http.routers.user-service.middlewares: user-strip
      traefik.http.services.user-service.loadbalancer.server.port: "8001"
      prometheus.scrape: "true"
      prometheus.port: "8001"
      prometheus.path: "/metrics"
    restart: unless-stopped

  product-service:
    build:
      context: ../../services/product-service
      target: runtime
    environment:
      DATABASE_URL: postgresql+asyncpg://${POSTGRES_USER:-shopmicro}:${POSTGRES_PASSWORD:-shopmicro_pass}@postgres:5432/product_db
      REDIS_URL: redis://redis:6379
      OTEL_SERVICE_NAME: product-service
      OTEL_EXPORTER_OTLP_ENDPOINT: http://jaeger:4317
      DEBUG: "false"
    ports:
      - "8002:8002"
    networks:
      - shopmicro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    labels:
      traefik.enable: "true"
      traefik.http.routers.product-service.rule: "PathPrefix(`/api/products`)"
      traefik.http.routers.product-service.entrypoints: web
      traefik.http.middlewares.product-strip.stripprefix.prefixes: "/api"
      traefik.http.routers.product-service.middlewares: product-strip
      traefik.http.services.product-service.loadbalancer.server.port: "8002"
      prometheus.scrape: "true"
      prometheus.port: "8002"
      prometheus.path: "/metrics"
    restart: unless-stopped
